<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIP CARD GAME</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="game-container">
        <header class="game-header">
            <h1>Tìm kiếm <span class="accent">nửa kia</span></h1>
            <div class="game-controls">
                <button id="start-btn" class="primary-btn">Bắt đầu trò chơi</button>
                <div id="timer-display" class="timer-card hidden">
                    <span class="timer-label">Thời gian xem:</span>
                    <span id="countdown">60</span>s
                </div>
            </div>
        </header>

        <section class="game-board">
            <div class="column left-column">
                <h2>Tình huống</h2>
                <div class="card-grid" id="left-grid">
                    <!-- Cards will be injected by JS -->
                </div>
            </div>

            <div class="column actions-column">
                <div class="selection-status">
                    <div class="select-indicator left-indicator" id="left-selected-label">Tình Huống: ?</div>
                    <div class="connector"></div>
                    <div class="select-indicator right-indicator" id="right-selected-label">Chiến Lược: ?</div>
                </div>
            </div>

            <div class="column right-column">
                <h2>Chiến lược</h2>
                <div class="card-grid" id="right-grid">
                    <!-- Cards will be injected by JS -->
                </div>
            </div>
        </section>

        <aside class="results-sidebar">
            <h3>Lịch sử lượt chơi</h3>
            <button id="confirm-btn" class="confirm-btn hidden">Xác nhận</button>
            <!-- <button id="finish-btn" class="finish-btn secondary-btn">Hoàn thành & So sánh</button> -->
            <div id="results-list" class="results-list">
                <p class="empty-msg">Chưa có kết quả nào được lưu.</p>
            </div>
        </aside>
    </main>

    <!-- Modal for Comparison Results -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Kết quả so sánh</h2>
            <div id="comparison-body" class="comparison-body"></div>
            <button id="restart-btn" class="primary-btn">Chơi lại</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
